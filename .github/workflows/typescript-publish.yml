name: Publish TypeScript Packages

on:
  push:
    branches:
      - main

permissions:
  contents: read

# Prevent concurrent publishes
concurrency:
  group: typescript-publish
  cancel-in-progress: false

jobs:
  typescript-build:
    uses: ./.github/workflows/typescript-build.yml

  typescript-test:
    uses: ./.github/workflows/typescript-test.yml

  # ── Publish canary snapshot on every push to main ──
  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    needs: [typescript-build, typescript-test]
    permissions:
      contents: read
      id-token: write     # npm provenance (OIDC)
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        uses: ./.github/workflows/actions/install-dependencies

      - name: Setup npm registry auth
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Check for changesets
        id: check
        run: |
          if [ ! -d .changeset ]; then
            echo "::error::.changeset directory not found"
            exit 1
          fi
          # Only publish canary if there are real changeset entries (not just README.md)
          if find .changeset -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "Changesets found, will publish canary"
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "No changesets found, skipping canary publish"
          fi

      - name: Build
        if: steps.check.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Version as canary snapshot
        if: steps.check.outputs.has_changesets == 'true'
        run: pnpm changeset version --snapshot canary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild with canary version
        if: steps.check.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Pack tarball
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          mkdir -p .npm-pack
          pnpm pack --pack-destination .npm-pack
          echo "Packed tarball:"
          ls -la .npm-pack/

      - name: Publish canary to npm
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          TARBALL_COUNT=$(ls .npm-pack/*.tgz 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TARBALL_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 tarball in .npm-pack, found $TARBALL_COUNT"
            ls -la .npm-pack/
            exit 1
          fi
          TARBALL=$(ls .npm-pack/*.tgz)
          echo "Publishing ${TARBALL} with tag 'canary'..."
          npm publish "$TARBALL" --access public --tag canary
          echo "Published successfully"

  # ── Create version PR, or publish release when version PR is merged ──
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [typescript-build, typescript-test]
    permissions:
      contents: write       # Push tags, create releases, changesets PR
      id-token: write       # npm provenance (OIDC)
      pull-requests: write  # Changesets PR
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        uses: ./.github/workflows/actions/install-dependencies

      - name: Setup npm registry auth
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        run: pnpm build

      - name: Run type check
        run: pnpm test:types

      - name: Create version PR or publish
        id: changesets
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba # v1.5.3
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TAG: latest

      - name: Get published version
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | node -e "
            const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const pkg = pkgs.find(p => p.name === 'create-solana-dapp');
            if (pkg) console.log(pkg.version);
          ")
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from publishedPackages output"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Create and push tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            echo "Created tag $TAG"
          fi
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tagName = `v${version}`;
            const releaseName = `create-solana-dapp v${version}`;
            const isPrerelease = version.includes('-');

            const body = `## create-solana-dapp v${version}

            ### Installation

            \`\`\`bash
            npx create-solana-dapp@${version}
            \`\`\`
            `;

            // Check if release already exists
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              console.log(`Release ${tagName} already exists, skipping`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: body.trim(),
              draft: false,
              prerelease: isPrerelease,
            });

            console.log(`Created release: ${releaseName}`);

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## TypeScript Package Published

          **Version**: \`${VERSION}\`
          **Package**: \`create-solana-dapp\`
          **Tag**: \`v${VERSION}\`
          **npm tag**: \`latest\`

          Published to npm: https://www.npmjs.com/package/create-solana-dapp/v/${VERSION}
          GitHub release: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}
          EOF
